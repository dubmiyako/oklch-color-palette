<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Color Harmony - Industrial Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <span class="dot-text">COLOR_HARMONY_STUDIO</span>
            <span class="version">V2.1_IND_PRO</span>
        </div>
        <div class="header-toolbar">
            <button id="btnExportPng" class="tool-btn" title="EXPORT_PNG">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            </button>
            <button id="btnExportAco" class="tool-btn" title="EXPORT_ACO">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 7h7l-5.6 4.4L18.6 22 12 17.6 5.4 22l2.2-8.6L2 9h7l3-7z"/></svg>
            </button>
            <div class="divider"></div>
            <button id="themeToggle" class="tool-btn" title="TOGGLE_THEME">
                <svg id="themeIconSun" class="theme-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg id="themeIconMoon" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <main class="container">
        <!-- Sidebar: Compact Config -->
        <aside class="sidebar">
            <section class="card industrial compact animate-in" style="animation-delay: 0.1s;">
                <h2 class="card-title">01_CONFIG</h2>
                
                <div class="control-group">
                    <label class="control-label">HARMONY_PATTERN</label>
                    <select id="harmonyPattern" class="select-input">
                        <option value="manual">MANUAL</option>
                        <option value="complementary">COMPLEMENTARY</option>
                        <option value="split">SPLIT-COMP</option>
                        <option value="triadic" selected>TRIADIC</option>
                        <option value="analogous">ANALOGOUS</option>
                    </select>
                </div>

                <div class="control-group tighter">
                    <label class="control-label">PRIMARY (T1)</label>
                    <div class="picker-row">
                        <input type="color" id="themePicker1" value="#38bdf8">
                        <div class="lch-display" id="lch1">L:-- C:-- H:--</div>
                    </div>
                </div>

                <div class="control-group tighter">
                    <label class="control-label">AMBIENT (T2)</label>
                    <div class="picker-row">
                        <input type="color" id="themePicker2" value="#818cf8">
                        <div class="lch-display" id="lch2">L:-- C:-- H:--</div>
                    </div>
                </div>

                <div class="control-group tighter">
                    <label class="control-label">ACCENT (AC)</label>
                    <div class="picker-row">
                        <input type="color" id="accentPicker" value="#fbbf24">
                        <div class="lch-display" id="lchA">L:-- C:-- H:--</div>
                    </div>
                </div>
            </section>

            <section class="card industrial compact animate-in" style="animation-delay: 0.2s;">
                <h2 class="card-title">02_SKIN_BASE</h2>
                <div class="skin-palette sidebar-grid" id="skinBasePicker">
                    <!-- Filled by JS -->
                </div>
            </section>
        </aside>

        <!-- Main Content: Optimized Rows -->
        <section class="main-content">
            <div class="top-row">
                <div class="card industrial wheel-section animate-in" style="animation-delay: 0.35s;">
                    <h2 class="card-title">03_WAVE_WHEEL</h2>
                    <div class="wheel-flex">
                        <div class="wheel-outer">
                            <canvas id="wheelCanvas" width="400" height="400"></canvas>
                            <div id="wheelHandles"></div>
                        </div>
                        <div class="slider-container">
                            <label class="control-label vertical-label">BRIGHTNESS</label>
                            <input type="range" id="lightnessSlider" min="0" max="1" step="0.01" value="0.7" class="vertical-range industrial" orient="vertical">
                            <button id="btnResetWheel" class="reset-btn" title="RESET_WHEEL">RES</button>
                        </div>
                    </div>
                </div>

                <div class="card industrial atmospheric-section animate-in" style="animation-delay: 0.4s;">
                    <h2 class="card-title">04_ATMOSPHERIC_SKIN</h2>
                    <div class="skin-palette compact-grid" id="skinPaletteDisplay">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

            <div class="card industrial variations-section animate-in" style="animation-delay: 0.5s;">
                <h2 class="card-title">05_OKLCH_VARIATIONS (TRI-SOURCE)</h2>
                <div id="variationGrid" class="variation-columns">
                    <!-- Filled by JS: 3 columns for T1, T2, AC -->
                </div>
            </div>
        </section>
    </main>

    <div id="toast">SYSTEM_MESSAGE: COPIED</div>

    <script src="./app.js"></script>
</body>
</html>
